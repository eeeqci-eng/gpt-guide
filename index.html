<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDDA CHiC | 幸运互动中心</title>
    <style>
        :root {
            --primary-color: #111; /* 品牌黑色调 */
            --gold-color: #d4af37;
            --bg-color: #f4f4f4;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; flex-direction: column; }
        
        .slot-machine { background: #fff; border: 8px solid var(--primary-color); padding: 30px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); text-align: center; width: 350px; }
        .brand-title { font-size: 24px; font-weight: bold; margin-bottom: 20px; letter-spacing: 2px; }
        
        .display { display: flex; justify-content: space-around; background: #eee; padding: 20px; border-radius: 10px; margin-bottom: 25px; border: 2px inset #fff; }
        .slot { font-size: 50px; width: 80px; height: 100px; line-height: 100px; background: white; border-radius: 5px; box-shadow: 0 4px 0 #ccc; }

        .controls button { background: var(--primary-color); color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .controls button:hover { background: #333; transform: scale(1.05); }
        .controls button:disabled { background: #ccc; cursor: not-allowed; }

        .result-msg { margin-top: 20px; height: 24px; font-weight: bold; color: var(--gold-color); }
    </style>
</head>
<body>

<div class="slot-machine">
    <div class="brand-title">REDDA CHiC</div>
    <div class="display">
        <div id="slot1" class="slot">👗</div>
        <div id="slot2" class="slot">👗</div>
        <div id="slot3" class="slot">👗</div>
    </div>
    <div class="controls">
        <button id="spinBtn" onclick="spin()">抽取专属优惠</button>
    </div>
    <div id="msg" class="result-msg"></div>
</div>

<script>
    const items = ['👗', '👠', '👜', '💄', '💍', '✨'];
    let isSpinning = false;

    function spin() {
        if (isSpinning) return;
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('msg').innerText = "正在为您寻找惊喜...";

        let count = 0;
        const maxCounts = 20;
        const interval = setInterval(() => {
            document.getElementById('slot1').innerText = items[Math.floor(Math.random() * items.length)];
            document.getElementById('slot2').innerText = items[Math.floor(Math.random() * items.length)];
            document.getElementById('slot3').innerText = items[Math.floor(Math.random() * items.length)];
            count++;

            if (count >= maxCounts) {
                clearInterval(interval);
                finishSpin();
            }
        }, 100);
    }

    function finishSpin() {
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;
        const s1 = document.getElementById('slot1').innerText;
        const s2 = document.getElementById('slot2').innerText;
        const s3 = document.getElementById('slot3').innerText;

        if (s1 === s2 && s2 === s3) {
            document.getElementById('msg').innerText = "恭喜！获得 50元 无门槛优惠券";
        } else {
            document.getElementById('msg').innerText = "差点就中奖了，再试一次吧！";
        }
    }
</script>

</body>
</html>
